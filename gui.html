<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steuerung</title>
    <!-- Socket.io for real-time communication -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" type="text/css" href="gui.css" />
    
    <!-- Google Fonts: Open Sauce One -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sauce+One:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Main controller interface -->
    <main class="controller-shell">
      <!-- Header with title and connection status -->
      <header class="controller-header">
        <div>
          <p class="eyebrow">Steuerung</p>
          <h1>«Shifting Democracies»</h1>
          <p class="subtitle">Wechseln Sie das angezeigte Land und passen Sie die drei Live-Parameter an.</p>
        </div>

        <!-- Connection status indicator -->
        <div id="status" class="status-pill disconnected">getrennt</div>
      </header>

      <!-- Country navigation section -->
      <section class="country-panel" aria-label="Ländernavigation">
        <!-- Previous button -->
        <button class="nav-button" id="prev-country" type="button" aria-label="Vorheriges Land">&#8249;</button>

        <!-- Current country display -->
        <div class="country-display" id="country-display">
          <span class="country-label">Angezeigtes Land</span>
          <div class="country-name" id="country-name">Warte auf Skizze...</div>
          <div class="country-meta" id="country-meta">0 / 0</div>
        </div>

        <!-- Next button -->
        <button class="nav-button" id="next-country" type="button" aria-label="Nächstes Land">&#8250;</button>
      </section>

      <!-- Year navigation section -->
      <section class="year-panel" aria-label="Jahresnavigation">
        <button class="nav-button" id="prev-year" type="button" aria-label="Vorheriges hervorgehobenes Jahr">&#8249;</button>
        <div class="year-display" id="year-display">
          <span class="year-label">Angezeigtes Jahr</span>
          <div class="year-name" id="year-name">-</div>
          <div class="year-meta" id="year-meta">0 / 0</div>
        </div>
        <button class="nav-button" id="next-year" type="button" aria-label="Nächstes hervorgehobenes Jahr">&#8250;</button>
      </section>

      <!-- Parameter slider controls -->
      <section class="sliders" aria-label="Parametersteuerung">
        <!-- Satisfaction with Economy slider (0-10) -->
        <div class="slider-row">
          <div class="slider-head">
            <label for="stfeco">Zufriedenheit mit der Wirtschaft</label>
            <span id="stfeco-val">5</span>
          </div>
          <input type="range" id="stfeco" min="0" max="10" step="1" value="5" />
        </div>

        <!-- Satisfaction with Life slider (0-10) -->
        <div class="slider-row">
          <div class="slider-head">
            <label for="stflife">Zufriedenheit mit dem Leben</label>
            <span id="stflife-val">5</span>
          </div>
          <input type="range" id="stflife" min="0" max="10" step="1" value="5" />
        </div>

        <!-- Satisfaction with Government slider (0-10) -->
        <div class="slider-row">
          <div class="slider-head">
            <label for="stfgov">Zufriedenheit mit der Regierung</label>
            <span id="stfgov-val">5</span>
          </div>
          <input type="range" id="stfgov" min="0" max="10" step="1" value="5" />
        </div>
      </section>
    </main>

    <!-- Load controller logic -->
    <script src="gui.js"></script>
  </body>
</html>
